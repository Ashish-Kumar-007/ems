version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ems_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ems_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ems_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ems_network

  server:
    build:
      context: ./server
      dockerfile: ../Dockerfile.server
    container_name: ems_server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=5000
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ems_db?schema=public
      - JWT_SECRET=ems-super-secret-jwt-key-2024-prod
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_SECRET=ems-super-secret-refresh-key-2024-prod
      - JWT_REFRESH_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/logs:/app/logs
    networks:
      - ems_network
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             npm run start"

  client:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
    container_name: ems_client
    depends_on:
      - server
    ports:
      - "3000:3000"
    networks:
      - ems_network

volumes:
  postgres_data:

networks:
  ems_network:
    driver: bridge
